services:
  - type: web
    name: lifetracker-api
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: lifetracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lifetracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lifetracker-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lifetracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lifetracker-db
          property: password

databases:
  - name: lifetracker-db
    plan: free
    databaseName: lifetracker
    user: lifetracker
