name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Build Frontend
        working-directory: ./lifetracker-frontend
        run: |
          npm ci
          npx ng build --configuration production

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL not set. Skipping deploy trigger."
            echo "   Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 0
          fi
          curl -s "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Deploy triggered on Render"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
