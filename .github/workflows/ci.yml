name: CI

on:
  push:
    branches: [main, working]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./backend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lifetracker-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./lifetracker-frontend/package-lock.json
      - run: npm ci
      - run: npx ng build --configuration production
