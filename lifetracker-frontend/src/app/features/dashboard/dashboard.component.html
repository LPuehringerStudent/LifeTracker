<div class="dashboard-page">
  <header class="dashboard-header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <span class="brand-text">LifeTracker</span>
    </div>
    <div class="header-user">
      @if (user()) { <span class="user-name">{{ user()!.username }}</span> }
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="welcome-card">
      <div class="welcome-content">
        <h1>{{ greeting() }}, {{ user()?.username ?? 'friend' }}</h1>
        <p>This is your personal space. More features are coming soon.</p>
      </div>
      <div class="welcome-illustration">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="80" stroke="currentColor" stroke-width="1" stroke-opacity="0.2"/>
          <circle cx="100" cy="100" r="60" stroke="currentColor" stroke-width="1" stroke-opacity="0.3"/>
          <circle cx="100" cy="100" r="40" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
          <circle cx="100" cy="100" r="4" fill="currentColor" fill-opacity="0.6"/>
          <line x1="100" y1="20" x2="100" y2="60" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="100" y1="140" x2="100" y2="180" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="100" x2="60" y2="100" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="140" y1="100" x2="180" y2="100" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">Entries</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">Streak</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">Notes</span>
        </div>
      </div>
    </div>
  </main>
</div>
